  # =================== Shadowsocks 节点配置 ===================
  - PanelType: V2board            # 面板类型
    ApiConfig:
      ApiHost: "https://panel.example.com"
      ApiKey: "REPLACE_WITH_YOUR_API_KEY"         # 节点通讯密钥（与上面相同）
      NodeID: 3                           # Shadowsocks 节点 ID（不同于VLESS）
      NodeType: Shadowsocks               # 节点类型：Shadowsocks
      Timeout: 30                         # 请求超时（秒）
      EnableVless: false                  # 不启用 VLESS
      SpeedLimit: 0                       # 限速（Mbps），0 表示不限速
      DeviceLimit: 0                      # 限制同时在线设备数
      RuleListPath:                       # 自定义规则列表路径
      DisableCustomConfig: false          # 禁用面板自定义配置

    ControllerConfig:
      ListenIP: 0.0.0.0                 # 监听 IP
      ListenPort: 2055                    # Shadowsocks 监听端口（不同于VLESS）
      SendIP: 0.0.0.0                    # 出站使用的 IP
      UpdatePeriodic: 60                  # 向面板汇报周期（秒）
      DeviceOnlineMinTraffic: 100         # 设备在线流量最小值（KB）
      EnableDNS: false                    # 是否启用自定义 DNS
      DNSType: AsIs                       # DNS 策略
      EnableProxyProtocol: false          # 是否开启 PROXY 协议

      # ================= Shadowsocks 特有配置 =================
      CypherMethod: aes-256-gcm           # 加密方式
      
      # ================= 自动限速相关 =================
      AutoSpeedLimitConfig:
        Limit: 0
        WarnTimes: 0
        LimitSpeed: 0
        LimitDuration: 0

      # ================= 全局设备限制 =================
      GlobalDeviceLimitConfig:
        Enable: false                     # 不启用全局设备限制
        RedisNetwork: tcp
        RedisAddr: 127.0.0.1:6379
        RedisUsername:
        RedisPassword:
        RedisDB: 0
        Timeout: 5
        Expiry: 60

      # ================= TLS 配置（SS不需要） =================
      CertConfig:
        CertMode: none                    # SS 不需要 TLS
        CertDomain: ""
        CertFile: ""
        KeyFile: ""
        Provider: ""
        Email: ""
        DNSEnv: {}
  
  # =================== VMess 节点配置 ===================
  - PanelType: V2board            # 面板类型
    ApiConfig:
      ApiHost: "https://panel.example.com"
      ApiKey: "REPLACE_WITH_YOUR_API_KEY"              # 节点通讯密钥（与上面相同）
      NodeID: 3                           # VMess 节点 ID（不同于其他节点）
      NodeType: V2ray                     # 节点类型：V2ray（VMess使用V2ray类型）
      Timeout: 30                         # 请求超时（秒）
      EnableVless: false                  # 不启用 VLESS（使用VMess）
      SpeedLimit: 0                       # 限速（Mbps），0 表示不限速
      DeviceLimit: 0                      # 限制同时在线设备数
      RuleListPath:                       # 自定义规则列表路径
      DisableCustomConfig: false          # 禁用面板自定义配置

    ControllerConfig:
      ListenIP: 0.0.0.0                 # 监听 IP
      ListenPort: 3055                    # VMess 监听端口（不同于其他协议）
      SendIP: 0.0.0.0                    # 出站使用的 IP
      UpdatePeriodic: 60                  # 向面板汇报周期（秒）
      DeviceOnlineMinTraffic: 100         # 设备在线流量最小值（KB）
      EnableDNS: false                    # 是否启用自定义 DNS
      DNSType: AsIs                       # DNS 策略
      EnableProxyProtocol: false          # 是否开启 PROXY 协议

      # ================= 自动限速相关 =================
      AutoSpeedLimitConfig:
        Limit: 0
        WarnTimes: 0
        LimitSpeed: 0
        LimitDuration: 0

      # ================= 全局设备限制 =================
      GlobalDeviceLimitConfig:
        Enable: false                     # 不启用全局设备限制
        RedisNetwork: tcp
        RedisAddr: 127.0.0.1:6379
        RedisUsername:
        RedisPassword:
        RedisDB: 0
        Timeout: 5
        Expiry: 60

      # ================= 回落配置 =================
      EnableFallback: false
      FallBackConfigs:
        - SNI:
          Alpn:
          Path:
          Dest: 80
          ProxyProtocolVer: 0

      # ================= TLS 配置 =================
      CertConfig:
        CertMode: none                    # 必须为 none，表示不处理 TLS
        CertDomain: ""
        CertFile: ""
        KeyFile: ""
        Provider: ""
        Email: ""
        DNSEnv: {}

