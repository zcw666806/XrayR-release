# ======================= 日志配置 =======================
Log:
  Level: info                      # 日志等级：none/error/warning/info/debug
  AccessPath: ./access.log         # 访问日志路径
  ErrorPath: ./error.log           # 错误日志路径

# ======================= 可选模块路径（不启用时写 ~） =======================
DnsConfigPath: ~                   # DNS 配置路径，如不启用请填 ~
RouteConfigPath: /etc/XrayR/route.json  # 路由规则配置路径，如不启用也可填 ~
InboundConfigPath: ~              # 自定义入站配置（如需完整控制端口协议等）
OutboundConfigPath: ~             # 自定义出站配置

# ======================= 连接参数设置 =======================
ConnectionConfig:
  Handshake: 10                    # 握手超时时间（秒）
  ConnIdle: 30                    # 空闲连接保留时间（秒）
  UplinkOnly: 6                   # 下行关闭后保留上行时间（秒）
  DownlinkOnly: 6                 # 上行关闭后保留下行时间（秒）
  BufferSize: 64                  # 缓冲区大小（KB）

# ======================= 节点设置（最简单部分） =======================
Nodes:
  - PanelType: V2board           # 面板类型，SSpanel, V2board, NewV2board, PMpanel, Proxypanel, V2RaySocks, GoV2Panel
    ApiConfig:
      ApiHost: "https://panel.example.com"  # 你的 v2board 面板地址（带 https）
      ApiKey: "REPLACE_WITH_YOUR_API_KEY"            # 节点通讯密钥（后台设置）
      NodeID: 7                              # 节点 ID（后台创建节点后可见）
      NodeType: V2ray                        # 节点类型，可选 V2ray, Vmess, Vless, Shadowsocks, Trojan, Shadowsocks-Plugin
      Timeout: 30                            # 请求超时（秒）
      EnableVless: true                      # 是否启用 VLESS 协议
      SpeedLimit: 0                          # 限速（Mbps），0 表示不限速
      DeviceLimit: 0                         # 限制同时在线设备数，0 表示不限制
      RuleListPath:                          # 自定义规则列表路径（通常不使用）
      DisableCustomConfig: false             # 禁用面板自定义配置（通常为 false）

    ControllerConfig:
      ListenIP: 0.0.0.0                     # 监听 IP，仅监听本机以配合 Nginx 反代
      ListenPort: 8055                      # 本地监听端口（供 Nginx 反代转发）
      SendIP: 0.0.0.0                        # 出站使用的 IP
      UpdatePeriodic: 60                     # 向面板汇报周期（秒）
      DeviceOnlineMinTraffic: 100            # 设备在线流量最小值（KB）
      EnableDNS: false                       # 是否启用自定义 DNS
      DNSType: AsIs                          # DNS 策略 AsIs / UseIP / UseIPv4 / UseIPv6
      EnableProxyProtocol: false             # TCP/WebSocket 是否开启 PROXY 协议

      # ================= 自动限速相关（可关闭） =================
      AutoSpeedLimitConfig:
        Limit: 0
        WarnTimes: 0
        LimitSpeed: 0
        LimitDuration: 0

      # ================= 全局设备限制（需配合 Redis 使用） =================
      GlobalDeviceLimitConfig:
        Enable: false                        # 不启用全局设备限制
        RedisNetwork: tcp
        RedisAddr: 127.0.0.1:6379
        RedisUsername:
        RedisPassword:
        RedisDB: 0
        Timeout: 5
        Expiry: 60

      # ================= 回落配置（不启用） =================
      EnableFallback: false
      FallBackConfigs:
        - SNI:
          Alpn:
          Path:
          Dest: 80
          ProxyProtocolVer: 0

      # ================= REALITY 配置（暂不启用） =================
      EnableREALITY: false
      DisableLocalREALITYConfig: false
      REALITYConfigs:
        Show: false
        Dest: m.media-amazon.com:443
        ProxyProtocolVer: 0
        ServerNames:
          - m.media-amazon.com
        PrivateKey:
        MinClientVer:
        MaxClientVer:
        MaxTimeDiff: 0
        ShortIds:
          - ""

      # ================= TLS 配置（Nginx 已负责 TLS，这里必须禁用） =================
      CertConfig:
        CertMode: none                       # 必须为 none，表示不处理 TLS
        CertDomain: ""                       # 留空即可
        CertFile: ""
        KeyFile: ""
        Provider: ""
        Email: ""
        DNSEnv: {}

  # =================== REALITY 节点配置 ===================
